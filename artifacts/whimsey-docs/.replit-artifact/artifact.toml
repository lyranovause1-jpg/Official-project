kind = "web"
previewPath = "/"
title = "WHIMSEY Discord Setup Guide"
version = "1.0.0"
id = "artifacts/whimsey-docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18731

[services.development]
run = "pnpm --filter @workspace/whimsey-docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whimsey-docs", "run", "build" ]
publicDir = "artifacts/whimsey-docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18731"
BASE_PATH = "/"
