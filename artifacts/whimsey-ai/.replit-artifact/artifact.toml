kind = "web"
previewPath = "/whimsey-ai/"
title = "WHIMSEY AI Assistant"
version = "1.0.0"
id = "artifacts/whimsey-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/whimsey-ai/" ]
localPort = 22327

[services.development]
run = "pnpm --filter @workspace/whimsey-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whimsey-ai", "run", "build" ]
publicDir = "artifacts/whimsey-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22327"
BASE_PATH = "/whimsey-ai/"
